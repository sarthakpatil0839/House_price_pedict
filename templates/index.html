<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House Price Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="main-container">

        <div class="header">
            <h1>House Price Prediction System</h1>
            <p>Machine Learning Based Final Year Project</p>
        </div>

        <div class="card">
            <form action="/predict" method="post">

                <div class="input-group">
                    <label for="area">Area (Square Feet)</label>
                    <input type="number" id="area" name="area" required>
                </div>

                <div class="input-group">
                    <label for="rooms">Number of Rooms</label>
                    <input type="number" id="rooms" name="rooms" required>
                </div>

                <div class="input-group">
                    <label for="age">House Age (Years)</label>
                    <input type="number" id="age" name="age" required>
                </div>

                <button type="submit">Predict House Price</button>
            </form>

            {% if result %}
            <div class="result-box">
                {{ result }}
            </div>
            {% endif %}
        </div>

        <div class="footer">
            © Final Year Project | Python & Machine Learning
        </div>

    </div>

</body>
</html>
